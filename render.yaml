services:
  - type: web
    name: intent-classifier-demo
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: EMBEDDING_PROVIDER
        value: jina          # change to: openai | cohere | voyageai | ollama | local
      - key: EMBEDDING_API_KEY
        sync: false          # set in Render dashboard — API key for chosen provider
      - key: EMBEDDING_MODEL
        sync: false          # optional: override the provider's default model
    healthCheckPath: /
