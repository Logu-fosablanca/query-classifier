services:
  - type: web
    name: intent-classifier-demo
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: EMBEDDING_PROVIDER
        value: jina
      - key: JINA_API_KEY
        sync: false  # set manually in Render dashboard
    healthCheckPath: /
